<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Hệ thống lớp học theo yêu cầu EEC</title>
    <link href="https://fonts.googleapis.com/css2?family=Quicksand:wght@500;700&display=swap" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.5.1/dist/confetti.browser.min.js"></script>
    <style>
        :root {
            --primary: #FF5722; /* Màu cam nổi bật cho EEC */
            --secondary: #4A90E2;
            --success: #4CAF50;
            --error: #FF5252;
            --bg: #FFF9F4;
            --text: #2C3E50;
        }

        * { box-sizing: border-box; font-family: 'Quicksand', sans-serif; }
        
        body {
            background-color: var(--bg);
            margin: 0;
            display: flex;
            flex-direction: column;
            align-items: center;
            min-height: 100vh;
            padding: 10px;
        }

        /* Tiêu đề nổi bật */
        .brand-header {
            text-align: center;
            background: linear-gradient(135deg, #FF5722 0%, #E64A19 100%);
            color: white;
            padding: 15px 25px;
            border-radius: 0 0 30px 30px;
            box-shadow: 0 8px 20px rgba(230, 74, 25, 0.3);
            margin-bottom: 25px;
            width: 100%;
            max-width: 600px;
        }

        .brand-header h1 {
            margin: 0;
            font-size: 1.3rem;
            text-transform: uppercase;
            letter-spacing: 1px;
            text-shadow: 2px 2px 4px rgba(0,0,0,0.2);
        }

        .brand-header p {
            margin: 5px 0 0 0;
            font-size: 1.1rem;
            font-weight: 700;
            opacity: 0.9;
        }

        #game-container {
            background: white;
            width: 100%;
            max-width: 500px;
            border-radius: 25px;
            padding: 25px;
            box-shadow: 0 15px 35px rgba(0,0,0,0.08);
            position: relative;
        }

        .progress-container {
            height: 12px;
            background: #F0F0F0;
            border-radius: 10px;
            margin: 20px 0;
            overflow: hidden;
        }

        #progress-bar {
            height: 100%;
            background: var(--secondary);
            width: 0%;
            transition: width 0.4s ease;
        }

        .question-box h2 {
            font-size: 1.15rem;
            line-height: 1.6;
            margin-bottom: 20px;
            color: #1A5276;
        }

        .options-container { display: grid; gap: 12px; }

        .option-btn {
            background: #F8FBFF;
            border: 2px solid #E1E8F0;
            padding: 16px;
            border-radius: 18px;
            cursor: pointer;
            font-size: 1rem;
            font-weight: 500;
            transition: 0.2s;
            text-align: left;
            outline: none;
            -webkit-tap-highlight-color: transparent;
        }

        .option-btn:active { transform: scale(0.98); background: #EBF5FB; }

        #feedback-modal {
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0,0,0,0.6);
            display: none;
            justify-content: center;
            align-items: center;
            z-index: 1000;
            padding: 20px;
        }

        .modal-content {
            background: white;
            padding: 30px;
            border-radius: 25px;
            text-align: center;
            max-width: 450px;
            width: 100%;
            animation: bounceIn 0.4s;
        }

        @keyframes bounceIn {
            0% { transform: scale(0.3); opacity: 0; }
            50% { transform: scale(1.05); }
            70% { transform: scale(0.9); }
            100% { transform: scale(1); opacity: 1; }
        }

        .explanation {
            background: #F4F6F7;
            padding: 15px;
            border-radius: 15px;
            font-size: 0.95rem;
            color: #444;
            margin: 15px 0;
            border-left: 5px solid var(--secondary);
            text-align: left;
        }

        .next-btn {
            background: var(--primary);
            color: white;
            border: none;
            padding: 15px 40px;
            border-radius: 50px;
            font-size: 1.1rem;
            font-weight: 700;
            cursor: pointer;
            box-shadow: 0 5px 15px rgba(255, 87, 34, 0.3);
        }

        .score-screen { text-align: center; display: none; }
    </style>
</head>
<body>

<div class="brand-header">
    <h1>Hệ thống lớp học theo yêu cầu EEC</h1>
    <p>📞 0913384254</p>
</div>

<div id="game-container">
    <div id="quiz-section">
        <div style="display: flex; justify-content: space-between; align-items: center;">
            <span style="font-weight:700; color:var(--secondary)">CÂU HỎI <span id="current-q">1</span>/20</span>
            <span id="score-display" style="font-weight:700; color:var(--success)">Điểm: 0</span>
        </div>
        <div class="progress-container">
            <div id="progress-bar"></div>
        </div>
        <div class="question-box">
            <h2 id="question-text">Đang tải câu hỏi...</h2>
            <div class="options-container" id="options"></div>
        </div>
    </div>

    <div id="score-section" class="score-screen">
        <h2 style="color: var(--primary)">🎉 TUYỆT VỜI! 🎉</h2>
        <p>Bạn đã chinh phục thử thách lý thuyết Phần trăm của EEC!</p>
        <div style="font-size: 4rem; color: var(--secondary); font-weight: 700; margin: 15px 0;" id="final-score">0</div>
        <p>Hãy liên hệ EEC nếu bạn cần hỗ trợ thêm nhé!</p>
        <button class="next-btn" onclick="location.reload()">Chơi lại ngay</button>
    </div>
</div>

<div id="feedback-modal">
    <div class="modal-content">
        <h3 id="modal-title" style="font-size: 1.8rem; margin: 0;"></h3>
        <p id="modal-msg" style="font-size: 1.1rem; margin: 10px 0;"></p>
        <div class="explanation" id="modal-explanation"></div>
        <button class="next-btn" id="modal-next-btn">Tiếp tục nào!</button>
    </div>
</div>

<audio id="snd-correct" src="https://assets.mixkit.co/active_storage/sfx/2013/2013-preview.mp3"></audio>
<audio id="snd-wrong" src="https://assets.mixkit.co/active_storage/sfx/2018/2018-preview.mp3"></audio>
<audio id="snd-finish" src="https://assets.mixkit.co/active_storage/sfx/1435/1435-preview.mp3"></audio>

<script>
    const quizData = [
        { q: "Kí hiệu % dùng để chỉ:", a: ["Phân số", "Số thập phân", "Phần trăm", "Tỉ số"], correct: 2, exp: "Kí hiệu % đọc là 'phần trăm'. Nó dùng để chỉ một số phần trong 100 phần bằng nhau." },
        { q: "1% nghĩa là:", a: ["1/10", "1/100", "1/1000", "10/100"], correct: 1, exp: "1% nghĩa là 1 phần trong 100 phần bằng nhau. Ta viết 1% = 1/100." },
        { q: "100% của một số bằng:", a: ["0", "Một nửa số đó", "Chính số đó", "Gấp đôi số đó"], correct: 2, exp: "100% đại diện cho toàn bộ giá trị. Vì vậy, 100% của một số bằng chính nó." },
        { q: "50% của một số có nghĩa là:", a: ["Một phần ba số đó", "Một phần tư số đó", "Một nửa số đó", "Gấp đôi số đó"], correct: 2, exp: "50% = 50/100 = 1/2. Do đó, 50% là một nửa của số ban đầu." },
        { q: "200% của một số sẽ:", a: ["Nhỏ hơn số đó", "Bằng số đó", "Gấp đôi số đó", "Gấp ba số đó"], correct: 2, exp: "200% = 200/100 = 2. Điều này có nghĩa là lấy số đó hai lần (gấp đôi)." },
        { q: "Muốn tìm 25% của một số ta thực hiện:", a: ["Nhân với 25", "Chia cho 25", "Nhân với 25 rồi chia cho 100", "Chia cho 100"], correct: 2, exp: "Theo quy tắc, muốn tìm p% của số a, ta lấy a nhân p rồi chia cho 100." },
        { q: "Khi tìm 10% của một số, ta có mẹo tính nhanh là:", a: ["Nhân với 10", "Chia cho 10", "Nhân với 100", "Cộng thêm 10"], correct: 1, exp: "10% = 10/100 = 1/10. Vì vậy tìm 10% tương đương với việc chia số đó cho 10." },
        { q: "Muốn tìm 1% của một số ta thực hiện:", a: ["Chia số đó cho 100", "Nhân số đó với 100", "Chia số đó cho 10", "Nhân số đó với 10"], correct: 0, exp: "1% tương ứng với 1/100. Muốn tìm 1% ta chỉ việc lấy số đó chia cho 100." },
        { q: "Trong tính giá trị phần trăm, phép tính đặc trưng là:", a: ["Cộng", "Trừ", "Nhân rồi chia", "Chia rồi trừ"], correct: 2, exp: "Để tìm giá trị phần trăm, ta luôn nhân số gốc với số phần trăm rồi chia cho 100." },
        { q: "75% của một số luôn:", a: ["Nhỏ hơn số đó", "Lớn hơn số đó", "Bằng số đó", "Không xác định"], correct: 0, exp: "Vì 75% nhỏ hơn 100% (là toàn bộ số ban đầu), nên kết quả luôn nhỏ hơn số đó." },
        { q: "Tìm một số khi biết 30% của nó, ta lấy giá trị đó:", a: ["Nhân với 30", "Chia cho 30", "Nhân với 100 rồi chia cho 30", "Chia cho 100"], correct: 2, exp: "Đây là bài toán ngược. Ta lấy giá trị đã biết nhân với 100 để tìm toàn bộ, rồi chia cho 30." },
        { q: "Biết 20% của một số bằng một giá trị, thì số ban đầu phải:", a: ["Nhỏ hơn giá trị đó", "Lớn hơn giá trị đó", "Bằng giá trị đó", "Không xác định"], correct: 1, exp: "20% chỉ là một phần nhỏ của 100%, nên số ban đầu chắc chắn phải lớn hơn." },
        { q: "Để tìm lại số ban đầu sau khi đã giảm 10%, ta lấy giá trị còn lại:", a: ["Nhân với 10", "Nhân với 100 rồi chia cho 90", "Chia cho 10", "Chia cho 100"], correct: 1, exp: "Giảm 10% nghĩa là còn 90%. Muốn tìm lại 100%, ta nhân 100 rồi chia cho 90." },
        { q: "Nếu một số tăng thêm 25% thì số mới chiếm bao nhiêu phần trăm?", a: ["25%", "75%", "100%", "125%"], correct: 3, exp: "Số cũ là 100%, tăng thêm 25% thì ta có: 100% + 25% = 125%." },
        { q: "Nếu một số bị giảm đi 40% thì số còn lại chiếm:", a: ["40%", "50%", "60%", "140%"], correct: 2, exp: "Số cũ là 100%, giảm đi 40% thì ta còn: 100% - 40% = 60%." },
        { q: "Cửa hàng 'Giảm giá 15%' có nghĩa là:", a: ["Tăng giá", "Bớt đi 15% so với giá ban đầu", "Bớt 15 đồng", "Chia giá cho 15"], correct: 1, exp: "Giảm giá % là bớt đi một phần tiền tương ứng với tỷ lệ đó từ giá niêm yết." },
        { q: "Một món hàng bán 'Lãi 20%' nghĩa là giá bán:", a: ["Thấp hơn vốn", "Bằng vốn", "Cao hơn vốn 20%", "Được giảm 20%"], correct: 2, exp: "Lãi là phần thu thêm. Lãi 20% nghĩa là giá bán bằng vốn cộng thêm 20% tiền vốn." },
        { q: "Lớp có 60% nữ thì so với số học sinh nam, số nữ sẽ:", a: ["Ít hơn", "Nhiều hơn", "Bằng nhau", "Không biết được"], correct: 1, exp: "Tổng lớp là 100%. Nữ 60% thì Nam là 40%. Vì 60% > 40% nên nữ nhiều hơn nam." },
        { q: "Khi một số tăng thêm đúng 100% giá trị của nó thì:", a: ["Gấp đôi số cũ", "Gấp ba số cũ", "Không đổi", "Bằng 0"], correct: 0, exp: "Tăng 100% là thêm một lượng bằng chính nó. Ví dụ có 5 thêm 5 là 10 (gấp đôi)." },
        { q: "Khi một số giảm đi đúng 100% giá trị của nó thì:", a: ["Gấp đôi", "Còn một nửa", "Bằng 0", "Không thay đổi"], correct: 2, exp: "Giảm 100% là bớt đi toàn bộ. Bất kỳ số nào bớt đi chính nó cũng sẽ bằng 0." }
    ];

    let currentQuestion = 0;
    let score = 0;

    const qText = document.getElementById('question-text');
    const optionsBox = document.getElementById('options');
    const currentQEl = document.getElementById('current-q');
    const scoreDisplay = document.getElementById('score-display');
    const progressBar = document.getElementById('progress-bar');
    const modal = document.getElementById('feedback-modal');

    function loadQuestion() {
        const data = quizData[currentQuestion];
        qText.innerText = data.q;
        optionsBox.innerHTML = '';
        currentQEl.innerText = currentQuestion + 1;
        progressBar.style.width = `${((currentQuestion) / 20) * 100}%`;

        data.a.forEach((opt, index) => {
            const btn = document.createElement('button');
            btn.className = 'option-btn';
            btn.innerText = opt;
            btn.onclick = () => checkAnswer(index);
            optionsBox.appendChild(btn);
        });
    }

    function checkAnswer(selected) {
        const data = quizData[currentQuestion];
        const isCorrect = selected === data.correct;
        
        if (isCorrect) {
            score += 0.5;
            scoreDisplay.innerText = `Điểm: ${score.toFixed(1)}`;
            document.getElementById('snd-correct').play();
            confetti({ particleCount: 120, spread: 70, origin: { y: 0.7 } });
            showModal("Chính xác! ✨", "EEC chúc mừng bạn nhé! Bạn nắm bài rất chắc.", data.exp, true);
        } else {
            document.getElementById('snd-wrong').play();
            showModal("Tiếc quá... ✍️", "Đừng nản lòng nhé, đọc giải thích này để hiểu hơn nè!", data.exp, false);
        }
    }

    function showModal(title, msg, exp, isCorrect) {
        document.getElementById('modal-title').innerText = title;
        document.getElementById('modal-title').style.color = isCorrect ? 'var(--success)' : 'var(--error)';
        document.getElementById('modal-msg').innerText = msg;
        document.getElementById('modal-explanation').innerHTML = `<strong>Giải thích:</strong> ${exp}`;
        modal.style.display = 'flex';
    }

    document.getElementById('modal-next-btn').onclick = () => {
        modal.style.display = 'none';
        currentQuestion++;
        if (currentQuestion < quizData.length) {
            loadQuestion();
        } else {
            showScore();
        }
    };

    function showScore() {
        progressBar.style.width = "100%";
        document.getElementById('quiz-section').style.display = 'none';
        document.getElementById('score-section').style.display = 'block';
        document.getElementById('final-score').innerText = score.toFixed(1);
        document.getElementById('snd-finish').play();
    }

    loadQuestion();
</script>
</body>
</html>
